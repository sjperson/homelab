auto lo
iface lo inet loopback

# ============================================================
# WiFi USB: uplink to router (DHCP)
# ============================================================
auto <WIFI_INTERFACE>
iface <WIFI_INTERFACE> inet dhcp
	wpa-conf /etc/wpa_supplicant/wpa_supplicant.conf

# ============================================================
# Internal bridge: NAT for LXCs (<LXC_SUBNET>)
# ============================================================
auto vmbr0
iface vmbr0 inet static
	address <LXC_SUBNET_GATEWAY>
	bridge-ports none
	bridge-stp off
	bridge-fd 0

	# IP forwarding
	post-up   echo 1 > /proc/sys/net/ipv4/ip_forward

	# NAT: masquerade LXC subnet outbound
	post-up   iptables -t nat -A POSTROUTING -s <LXC_SUBNET> -o <WIFI_INTERFACE> -j MASQUERADE
	post-down iptables -t nat -D POSTROUTING -s <LXC_SUBNET> -o <WIFI_INTERFACE> -j MASQUERADE

	# DNAT: forward WireGuard UDP to LXC vpn
	post-up   iptables -t nat -A PREROUTING -i <WIFI_INTERFACE> -p udp --dport <VPN_PORT> -j DNAT --to-destination <LXC_VPN_IP>:<VPN_PORT>
	post-down iptables -t nat -D PREROUTING -i <WIFI_INTERFACE> -p udp --dport <VPN_PORT> -j DNAT --to-destination <LXC_VPN_IP>:<VPN_PORT>

	# FORWARD: LXC <-> WAN
	post-up   iptables -A FORWARD -i vmbr0 -o <WIFI_INTERFACE> -j ACCEPT
	post-down iptables -D FORWARD -i vmbr0 -o <WIFI_INTERFACE> -j ACCEPT

	# FORWARD: WireGuard inbound (new + established)
	post-up   iptables -A FORWARD -i <WIFI_INTERFACE> -o vmbr0 -p udp --dport <VPN_PORT> -j ACCEPT
	post-down iptables -D FORWARD -i <WIFI_INTERFACE> -o vmbr0 -p udp --dport <VPN_PORT> -j ACCEPT
	post-up   iptables -A FORWARD -i <WIFI_INTERFACE> -o vmbr0 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
	post-down iptables -D FORWARD -i <WIFI_INTERFACE> -o vmbr0 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT

source /etc/network/interfaces.d/*