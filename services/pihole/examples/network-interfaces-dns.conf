# ============================================================
# /etc/network/interfaces — LXC dns (10.10.10.3)
# ============================================================

auto lo
iface lo inet loopback

auto eth0
iface eth0 inet static
	address <LXC_DNS_IP>/24
	gateway <LXC_SUBNET_GATEWAY>
	up ip route add <VPN_SUBNET> via <LXC_SUBNET_GATEWAY>
