# ============================================================
# WireGuard Client - External Profile
# Endpoint: DDNS (internet access)
# AllowedIPs: full tunnel (all traffic via VPN)
# ============================================================

[Interface]
Address = <VPN_CLIENT_PC>/24
PrivateKey = <VPN_CLIENT_PC_PRIVATE_KEY>
DNS = <VPN_SERVER_IP>

[Peer]
PublicKey = <VPN_SERVER_PUBLIC_KEY>
Endpoint = <VPN_DDNS_DOMAIN>:<VPN_PORT>
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25